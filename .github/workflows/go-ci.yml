name: Go CI

on:
  workflow_call:
    inputs:
      go-version-file:
        description: Path to go.mod for version detection
        type: string
        default: go.mod
      test-timeout:
        description: Timeout for go test
        type: string
        default: 5m
      timeout-minutes:
        description: Total workflow timeout
        type: number
        default: 30
      gosec-excludes:
        description: Comma-separated gosec rule IDs to exclude (e.g. G304,G107)
        type: string
        default: ""
      golangci-lint-version:
        description: golangci-lint version
        type: string
        default: v2.11
      environment:
        description: GitHub deployment environment name
        type: string
        default: ""
      environment-url:
        description: GitHub deployment environment URL
        type: string
        default: ""
      test-race:
        description: Enable -race flag on tests (disable to speed up CI)
        type: boolean
        default: true
      concurrency-suffix:
        description: Suffix for concurrency group (use when calling this workflow multiple times)
        type: string
        default: ""
      runs-on:
        description: GitHub runner label
        type: string
        default: ubuntu-24.04

permissions:
  contents: read

jobs:
  # ── Fast gate: lint catches obvious errors in ~30s ────────────────────
  lint:
    name: Lint
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 10
    concurrency:
      group: go-ci-lint-${{ github.workflow }}-${{ github.ref }}${{ inputs.concurrency-suffix && format('-{0}', inputs.concurrency-suffix) || '' }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - name: Verify dependencies
        run: go mod verify
      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ inputs.golangci-lint-version }}

  # ── Build + test: runs in parallel with lint ──────────────────────────
  build-test:
    name: Build & Test
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment:
      name: ${{ inputs.environment || null }}
      url: ${{ inputs.environment-url || null }}
    concurrency:
      group: go-ci-test-${{ github.workflow }}-${{ github.ref }}${{ inputs.concurrency-suffix && format('-{0}', inputs.concurrency-suffix) || '' }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true
      - name: Build
        run: go build -v ./...
      - name: Test
        uses: robherley/go-test-action@42a1975c97156330b5126c2f35ef0fb78c4c7154 # v0.7.1
        with:
          testArguments: ${{ inputs.test-race && '-race' || '' }} -failfast -count=1 -timeout ${{ inputs.test-timeout }} ./...
          omit: untested successful

  # ── Security: govulncheck + gosec in parallel with lint + test ────────
  security:
    name: Security
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 15
    concurrency:
      group: go-ci-sec-${{ github.workflow }}-${{ github.ref }}${{ inputs.concurrency-suffix && format('-{0}', inputs.concurrency-suffix) || '' }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          cache: true

      - name: Cache security tools
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/bin
          key: security-tools-${{ runner.os }}-govulncheck1.1.4-gosec2.22.4

      - name: Install govulncheck
        run: |
          if [ ! -f ~/go/bin/govulncheck ]; then
            go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          fi

      - name: govulncheck
        id: vulncheck
        run: |
          set +e
          govulncheck ./... 2>&1 | tee /tmp/govulncheck.out
          EXIT=${PIPESTATUS[0]}
          set -e

          VULNS=$(grep -c 'Vulnerability #' /tmp/govulncheck.out || true)
          echo "count=${VULNS}" >> "$GITHUB_OUTPUT"

          if [ "$EXIT" -ne 0 ]; then
            exit 1
          fi

      - name: Install gosec
        run: |
          if [ ! -f ~/go/bin/gosec ]; then
            go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          fi

      - name: gosec
        id: gosec
        shell: bash {0}
        run: |
          EXCLUDES="${{ inputs.gosec-excludes }}"
          ARGS=""
          if [ -n "$EXCLUDES" ]; then
            ARGS="-exclude=$EXCLUDES"
          fi

          gosec ${ARGS} -fmt json -out gosec.json ./... 2>&1 || true

          ISSUES=0
          if [ -f gosec.json ]; then
            ISSUES=$(jq '.Issues | length' gosec.json 2>/dev/null || echo "0")
          fi
          echo "issues=${ISSUES}" >> "$GITHUB_OUTPUT"

          if [ "${ISSUES}" -gt 0 ]; then
            echo "::error::gosec found ${ISSUES} issues"
            jq -r '.Issues[] | "\(.file):\(.line): \(.rule_id) - \(.details)"' gosec.json 2>/dev/null
            exit 1
          fi

  # ── Summary: aggregates results from all parallel jobs ────────────────
  summary:
    name: CI Summary
    needs: [lint, build-test, security]
    if: always()
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 5
    steps:
      - name: Summary
        run: |
          {
            echo "## Go CI Results"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"

            lint="${{ needs.lint.result }}"
            test="${{ needs.build-test.result }}"
            sec="${{ needs.security.result }}"

            [ "$lint" = "success" ] && echo "| Lint | :white_check_mark: |" || echo "| Lint | :x: |"
            [ "$test" = "success" ] && echo "| Build & Test | :white_check_mark: |" || echo "| Build & Test | :x: |"
            [ "$sec" = "success" ] && echo "| Security (govulncheck + gosec) | :white_check_mark: |" || echo "| Security | :x: |"

            EXCLUDES="${{ inputs.gosec-excludes }}"
            if [ -n "$EXCLUDES" ]; then
              echo ""
              echo "*gosec excludes: \`${EXCLUDES}\`*"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any check failed
        if: needs.lint.result == 'failure' || needs.build-test.result == 'failure' || needs.security.result == 'failure'
        run: exit 1
